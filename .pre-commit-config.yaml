# Optional git hooks. Run the full local gate with: npm run quality
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        name: ruff (backend + ml)
        files: ^(backend|ml|shared)/
      - id: ruff-format
        name: ruff format
        files: ^(backend|ml|shared)/

  - repo: local
    hooks:
      - id: quality-gate
        name: full quality gate
        entry: bash scripts/quality.sh
        language: system
        pass_filenames: false
        stages: [manual]
